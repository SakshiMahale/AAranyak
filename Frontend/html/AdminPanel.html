<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard - आranyak</title>
    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            background: #061306;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #4CAF50;
            margin: 30px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 🗺️ ENHANCED HEATMAP CONTAINER */
        .heatmap-container {
            position: relative;
            width: 85%;
            margin: auto;
            border: 2px solid #2d5a2d;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .heatmap-container img {
            width: 100%;
            display: block;
            filter: brightness(0.7) contrast(1.2);
        }

        /* 🛡️ OVERLAP LEGEND TABLE */
        .map-overlay-legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 20, 0, 0.8);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #4CAF50;
            z-index: 10;
            font-size: 12px;
        }

        .map-overlay-legend table {
            border-collapse: collapse;
        }

        .map-overlay-legend td {
            padding: 5px 10px;
        }

        /* 💠 ICON SHAPES & COLORS */
        .icon {
            position: absolute;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        /* Logic: Predators = Red Diamonds, Herbivores = Green Circles, Birds = Yellow Triangles */
        .predator {
            background: #ff3333;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 0 15px #ff3333;
        }

        .herbivore {
            background: #4CAF50;
            border-radius: 50%;
            box-shadow: 0 0 15px #4CAF50;
        }

        .small {
            background: #ff9800;
            border-radius: 3px;
            box-shadow: 0 0 15px #ff9800;
        }

        .water {
            background: #00bcd4;
            clip-path: inset(0 0 0 0 round 20% 50%);
            box-shadow: 0 0 15px #00bcd4;
        }

        .reptile {
            background: #9c27b0;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            box-shadow: 0 0 15px #9c27b0;
        }

        .bird {
            background: #ffeb3b;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            color: black;
            box-shadow: 0 0 15px #ffeb3b;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.3);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        /* 🌦️ WEATHER & FIRE STYLES (Keep existing or slight polish) */
        .weather-box {
            width: 350px;
            margin: 20px auto;
            padding: 20px;
            background: linear-gradient(145deg, #102510, #081a08);
            border-radius: 15px;
            text-align: center;
            border: 1px solid #4CAF50;
        }

        .fire-section {
            text-align: center;
            padding: 40px;
        }

        .status {
            font-size: 24px;
            margin-top: 15px;
        }

        .yes {
            color: #ff4444;
            text-shadow: 0 0 10px red;
        }

        .no {
            color: #4CAF50;
        }
    </style>
</head>

<body>

    <nav>
        <h1>आranyak</h1>
        <div class="nav-links">
            <a href="../html/index.html">Home</a>
            <a href="../html/ticket.html">Online Ticket Booking</a>
            <a href="../html/map.html">Map of आranyak</a>
            <a href="../html/safariDetail.html">Safari Details</a>
            <a href="#">Search</a>

            <!-- Admin path placeholder -->
            <a href="#">Admin Panel</a>
        </div>
    </nav>

    <h2>🗺️ Live Species Tracking Map</h2>

    <div class="heatmap-container">
        <img src="../html/jungle-map.jpeg" alt="Jungle Map">

        <div class="map-overlay-legend">
            <table>
                <tr>
                    <td>
                        <div class="predator" style="width:12px; height:12px; display:inline-block"></div>
                    </td>
                    <td>Predators (Tiger/Lion)</td>
                </tr>
                <tr>
                    <td>
                        <div class="herbivore" style="width:12px; height:12px; display:inline-block"></div>
                    </td>
                    <td>Herbivores (Deer/Ele)</td>
                </tr>
                <tr>
                    <td>
                        <div class="bird" style="width:12px; height:12px; display:inline-block"></div>
                    </td>
                    <td>Birds (Peacock/Eagle)</td>
                </tr>
                <tr>
                    <td>
                        <div class="water" style="width:12px; height:12px; display:inline-block"></div>
                    </td>
                    <td>Water (Croc)</td>
                </tr>
            </table>
        </div>

        <div class="icon predator" style="top: 25%; left: 35%;">T</div>
        <div class="icon predator" style="top: 45%; left: 65%;">L</div>

        <div class="icon herbivore" style="top: 60%; left: 25%;">D</div>
        <div class="icon herbivore" style="top: 75%; left: 55%;">E</div>

        <div class="icon bird" style="top: 15%; left: 80%;">P</div>
        <div class="icon bird" style="top: 20%; left: 15%;">B</div>

        <div class="icon water" style="top: 65%; left: 85%;">C</div>
    </div>

    <div class="weather-box">
        <h3>📡 Field Sensor Data</h3>
        <p>🌡️ Temp: <b id="temp">--</b>°C | 💧 Hum: <b id="humidity">--</b>%</p>
        <p>🌬️ Wind: <b id="wind">--</b> km/h</p>
    </div>

    <div class="fire-section">
        <div class="status" id="fireStatus">Status: <span class="no">SAFE</span></div>
    </div>

    <script>
        // Real-time logic for weather
        function updateWeather() {
            document.getElementById("temp").innerText = (25 + Math.random() * 5).toFixed(1);
            document.getElementById("humidity").innerText = (60 + Math.random() * 20).toFixed(0);
            document.getElementById("wind").innerText = (2 + Math.random() * 10).toFixed(1);
        }
        setInterval(updateWeather, 3000);
        updateWeather();

        // Fire detection logic
        function checkFire() {
            let status = document.getElementById("fireStatus");
            if (Math.random() > 0.9) {
                status.innerHTML = 'Status: <span class="yes">⚠️ FIRE DETECTED!</span>';
            } else {
                status.innerHTML = 'Status: <span class="no">✔️ NO FIRE DETECTED</span>';
            }
        }
        setInterval(checkFire, 5000);
    </script>
</body>

</html>
