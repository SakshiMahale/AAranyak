<!DOCTYPE html>
<html>

<head>
    <title>Online Ticket Booking - आranyak</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/vine.png">
</head>

<body>

    <!-- 🌿 NAVBAR -->
    <nav>
        <h1>आranyak</h1>

        <!-- KEEP CLASS SAME -->
        <div class="nav-links" id="navLinks"></div>
    </nav>

    <div class="container">

        <h2>🌿 Safari Ticket Booking</h2>

        <!-- User Info -->
        <input type="text" id="name" placeholder="Enter Name">
        <input type="number" id="age" placeholder="Enter Age">

        <!-- Date & Time -->
        <input type="date" id="date">
        <input type="time" id="time">

        <!-- Seats -->
        <h3>Select Seats</h3>
        <div class="tickets" id="seatBox"></div>

        <!-- Category -->
        <h3>Category</h3>

        <label>Male (₹500)</label>
        <input type="number" id="male" min="0" value="0">

        <label>Female (₹400)</label>
        <input type="number" id="female" min="0" value="0">

        <label>Child (₹200)</label>
        <input type="number" id="child" min="0" value="0">

        <!-- Total -->
        <h3 id="total">Total: ₹0</h3>

        <button onclick="bookTicket()">Book Ticket</button>

        <p id="warning"></p>

    </div>
    <footer>
        <p><b>Project:</b> आranyak Safari Management System</p>
        <p>By: (VJTI) {Vithika Surve, Sakshi Mahale, Bhakti Baraf}, (VESIT){ Vibhuti Sawant} </p>
        <p>Goal: Ensuring wildlife safety and intelligent monitoring.</p>
    </footer>

    <script defer src="../js/script.js"></script>



</body>

</html>
