<!DOCTYPE html>
<html>

<head>
    <title>Payment - आranyak</title>
    <link rel="stylesheet" href="../css/style.css">

    <link rel="icon" type="image/x-icon" href="../assets/vine.png">
</head>

<body class="payment-page">

    <nav>
        <h1>आranyak</h1>

        <!-- KEEP CLASS SAME -->
        <div class="nav-links" id="navLinks"></div>
    </nav>

    <div class="payment-wrapper">
        <div class="payment-container">

            <h2>Complete Payment</h2>

            <div id="details"></div>

            <h2> Choose Payment Method</h2>

            <div class="payment-options">
                <button onclick="selectMethod('GPay')">GPay</button>
                <button onclick="selectMethod('UPI')">UPI</button>
                <button onclick="selectMethod('Card')">Card</button>
            </div>

            <h3 id="selected"></h3>

            <button onclick="payNow()">Pay Now</button>

            <p id="status"></p>

        </div>
    </div>


    <script type="module" src="../js/script.js"></script>

</body>

</html>
