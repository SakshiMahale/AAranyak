<!DOCTYPE html>
<html>

<head>
    <title>Safari Jungle Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/vine.png">

    <style>
        /* Reset and ensure map fills screen */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: #0b1d0b;
        }

        /* Map container */
        #map {
            height: calc(100vh - 70px - 80px);
            /* full height minus nav + footer */
            width: 100%;
        }

        /* Jungle effect */
        .leaflet-container {
            background: #1b3d1b;
        }

        /* Red pulse markers */
        .pulse {
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            position: relative;
        }

        .pulse::after {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        /* 🌿 Glassy Safari Legend */
        .map-legend {
            position: absolute;
            top: 90px;
            right: 20px;
            background: linear-gradient(145deg, rgba(0, 60, 0, 0.9), rgba(0, 30, 0, 0.85));
            border: 1px solid rgba(0, 255, 100, 0.3);
            color: #eaffea;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.2);
            min-width: 160px;
        }

        /* Row style */
        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        /* Colored dot */
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 8px currentColor;
        }

        /* Colors */
        .blue {
            background: #2196F3;
            color: #2196F3;
        }

        .green {
            background: #4CAF50;
            color: #4CAF50;
        }

        .red {
            background: #ff3b3b;
            color: #ff3b3b;
        }

        /* Nav and footer styles */
        nav {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: #102510;
            color: white;
            z-index: 1000;
            position: relative;
        }

        footer {
            height: 80px;
            text-align: center;
            padding: 20px;
            background: #061306;
            color: white;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            color: #4CAF50;
        }
    </style>
</head>

<body>
    <nav>
        <h1>आranyak</h1>

        <!-- KEEP CLASS SAME -->
        <div class="nav-links" id="navLinks"></div>
    </nav>

    <div class="map-legend">

        <div class="legend-item">
            <span class="legend-dot green"></span>
            <span>Jeep</span>
        </div>

        <div class="legend-item">
            <span class="legend-dot red"></span>
            <span>Animal</span>
        </div>
    </div>
    <div id="map"></div>

    <footer>
        <p><b>Project:</b> आranyak Safari Management System</p>
        <p>By: (VJTI) {Vithika Surve, Sakshi Mahale, Bhakti Baraf}, (VESIT){ Vibhuti Sawant} </p>
        <p>Goal: Ensuring wildlife safety and intelligent monitoring.</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <script>
        // 1️⃣ Initialize the map in the div "map"
        window.map = L.map('map', {
            crs: L.CRS.Simple, // use simple coordinate system for image
            minZoom: -2
        });

        // 2️⃣ Dimensions of your jungle image
        const w = 2000; // width of image in pixels
        const h = 1500; // height of image in pixels
        const bounds = [[0, 0], [h, w]]; // top-left & bottom-right

        // 3️⃣ Add your image as map
        L.imageOverlay('jungle-map.jpeg', bounds).addTo(map);

        // 4️⃣ Set initial view
        map.fitBounds(bounds);

        // 5️⃣ Example animal occurrence markers
        // You need to provide coordinates in image coordinate system [y, x]
        // const animals = [
        //     [300, 400],
        //     [500, 800],
        //     [1000, 1500]
        // ];

        // animals.forEach(coord => {
        //     L.marker(coord, {
        //         icon: L.divIcon({ className: 'pulse' })
        //     }).addTo(map);
        // });


        // 🛤️ Safari route coordinates
        const routePoints = [

            // 🔻 ENTRY (bottom left curve)


            [296, 820],

            // 🔻 moving right curve
            [328, 744],
            [352, 604],
            [396, 472],

            // 🔻 lake side curve
            [528, 452],
            [592, 552],
            [608, 676],

            // 🔻 center jungle turn
            [656, 812],
            [756, 764],
            [792, 588],

            // 🔻 top curve
            [864, 436],
            [864, 300],
            [948, 220],

            // 🔻 right side descent
            [1024, 344],
            [1084, 476],
            [1144, 612],

            // 🔻 lower right curve
            [1148, 788],
            [1144, 968],
            [1252, 840],

            // 🔻 exit loop bottom
            [1216, 1128],
            [1236, 1340],
            [1192, 1484],

            // 🔻 bottom edge curve
            [1128, 1636],
            [1032, 1788],
            [920, 1700],

            // 🔻 final return to exit
            [784, 1848],
            [688, 1740],
            [600, 1572],

            // 🔻 back to exit gate
            [472, 1620],
            [368, 1500],
            [320, 1228],
            [256, 1140],
            [216, 1112]

        ];
        function getAngle(p1, p2) {
            const dy = p2[0] - p1[0];
            const dx = p2[1] - p1[1];
            return Math.atan2(dy, dx) * (180 / Math.PI);
        }

        const arrowIndexes = [5, 15, 25];

        arrowIndexes.forEach((i, index) => {

            if (i < routePoints.length - 1) {

                let angle = getAngle(routePoints[i], routePoints[i + 1]);

                // 🎯 FORCE 3rd arrow to point DOWN
                if (index === 2) {
                    angle = 90;   // 👈 THIS makes it point downward
                }

                L.marker(routePoints[i], {
                    icon: L.divIcon({
                        className: 'route-arrow',
                        html: `<div style="
                    transform: rotate(${angle}deg);
                    font-size: 26px;
                    color: #00ffcc;
                    text-shadow: 0 0 10px #00ffcc;
                ">➤</div>`,
                        iconSize: [30, 30]
                    })
                }).addTo(map);
            }
        });

        const last = routePoints.length - 1;

        L.marker(routePoints[last], {
            icon: L.divIcon({
                className: 'route-arrow',
                html: `<div style="
            transform: rotate(90deg);   /* 👈 force DOWN */
            font-size: 28px;
            color: #00ffcc;
            text-shadow: 0 0 12px #00ffcc;
        ">➤</div>`,
                iconSize: [30, 30]
            })
        }).addTo(map);

        // white glow base (visible on dark map)
        L.polyline(routePoints, {
            color: '#ffffff',
            weight: 8,
            opacity: 0.8
        }).addTo(map);

        // black dotted line on top
        L.polyline(routePoints, {
            color: '#000000',
            weight: 4,
            dashArray: '12, 10',
            opacity: 1
        }).addTo(map);
    </script>

    <script type="module" src="../js/script.js"></script>
    <script type="module" src="../js/map.js"></script>

</body>

</html>
