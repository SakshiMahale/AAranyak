<!DOCTYPE html>
<html>

<head>
    <title>Safari Jungle Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/vine.png">

    <style>
        /* Reset and ensure map fills screen */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: #0b1d0b;
        }

        /* Map container */
        #map {
            height: calc(100vh - 70px - 80px);
            /* full height minus nav + footer */
            width: 100%;
        }

        /* Jungle effect */
        .leaflet-container {
            background: #1b3d1b;
        }

        /* Red pulse markers */
        .pulse {
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            position: relative;
        }

        .pulse::after {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        /* Nav and footer styles */
        nav {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: #102510;
            color: white;
            z-index: 1000;
            position: relative;
        }

        footer {
            height: 80px;
            text-align: center;
            padding: 20px;
            background: #061306;
            color: white;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            color: #4CAF50;
        }
    </style>
</head>

<body>
    <nav>
        <h1>आranyak</h1>

        <!-- KEEP CLASS SAME -->
        <div class="nav-links" id="navLinks"></div>
    </nav>

    <div id="map"></div>

    <footer>
        <p><b>Project:</b> आranyak Safari Management System</p>
        <p>By: (VJTI) {Vithika Surve, Sakshi Mahale, Bhakti Baraf}, (VESIT){ Vibhuti Sawant} </p>
        <p>Goal: Ensuring wildlife safety and intelligent monitoring.</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <script>
        // 1️⃣ Initialize the map in the div "map"
        const map = L.map('map', {
            crs: L.CRS.Simple, // use simple coordinate system for image
            minZoom: -2
        });

        // 2️⃣ Dimensions of your jungle image
        const w = 2000; // width of image in pixels
        const h = 1500; // height of image in pixels
        const bounds = [[0, 0], [h, w]]; // top-left & bottom-right

        // 3️⃣ Add your image as map
        L.imageOverlay('jungle-map.jpeg', bounds).addTo(map);

        // 4️⃣ Set initial view
        map.fitBounds(bounds);

        // 5️⃣ Example animal occurrence markers
        // You need to provide coordinates in image coordinate system [y, x]
        const animals = [
            [300, 400],
            [500, 800],
            [1000, 1500]
        ];

        animals.forEach(coord => {
            L.marker(coord, {
                icon: L.divIcon({ className: 'pulse' })
            }).addTo(map);
        });
    </script>

</body>

</html>
