<!DOCTYPE html>
<html>

<head>
    <title>आranyak - Safari Intelligence</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../assets/vine.png">

</head>

<body>

    <div class="container">
        <h2>🧾 Safari Invoice</h2>

        <div id="invoiceBox"></div>

        <button onclick="downloadInvoice()">⬇ Download Invoice</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        const data = JSON.parse(localStorage.getItem("invoiceData"));

        const box = document.getElementById("invoiceBox");

        if (data) {
            box.innerHTML = `
                <p><b>Name:</b> ${data.name}</p>
                <p><b>Date:</b> ${data.date}</p>
                <p><b>Time Slot:</b> ${data.time}</p>
                <p><b>Seats:</b> ${data.seats.join(", ")}</p>
                <p><b>Total Amount:</b> ₹${data.totalAmount}</p>

                <hr>
            `;
        }

        function downloadInvoice() {
            const element = document.getElementById("invoiceBox");

            html2pdf().from(element).save("Aranyak_Invoice.pdf");
        }
    </script>
    <script type="module" src="../js/script.js"></script>

</body>

</html>
