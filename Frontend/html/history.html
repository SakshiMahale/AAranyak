<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin History - आranyak</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>


    <nav>
        <h1>आranyak</h1>

        <!-- KEEP CLASS SAME -->
        <div class="nav-links" id="navLinks"></div>
    </nav>
    <!-- 🌿 PAGE TITLE -->
    <section class="history-header">
        <h2>Visitor History</h2>
        <p>Track all visitors entering the sanctuary</p>
    </section>

    <!-- 🌿 FILTER SECTION (UI ONLY) -->
    <section class="history-filters">
        <input type="text" placeholder="Search by Name">
        <input type="date">
        <button>Search</button>
    </section>

    <!-- 🌿 TABLE -->
    <section class="history-table-section">

        <table class="history-table">

            <thead>
                <tr>
                    <th>Visitor Name</th>
                    
                    <th>Date of Visit</th>
                    <th>Seats Booked</th>
                    <th>Slots</th>
                </tr>
            </thead>

            <tbody id="historyTableBody">
            </tbody>

        </table>

    </section>


    <div id="vetPopup" class="vet-popup">
        🐾 Animal Welfare Vet <br>
        📞 +91 88795 XXXXX
    </div>


    <!-- 🌿 FOOTER -->
    <footer>
        <p>Admin Control Panel • आranyak Safari System</p>
    </footer>

    <script type="module" src="../js/script.js"></script>

</body>

</html>
