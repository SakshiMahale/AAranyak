<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin History - आranyak</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- 🌿 NAVBAR -->
    <nav>
        <h1>आranyak Admin</h1>

        <div class="nav-links" id="navLinks"></div>
    </nav>

    <!-- 🌿 PAGE TITLE -->
    <section class="history-header">
        <h2>Visitor History</h2>
        <p>Track all visitors entering the sanctuary</p>
    </section>

    <!-- 🌿 FILTER SECTION (UI ONLY) -->
    <section class="history-filters">
        <input type="text" placeholder="Search by Name">
        <input type="date">
        <button>Search</button>
    </section>

    <!-- 🌿 TABLE -->
    <section class="history-table-section">

        <table class="history-table">

            <thead>
                <tr>
                    <th>Visitor Name</th>
                    <th>Phone Number</th>
                    <th>Date of Visit</th>
                </tr>
            </thead>

            <tbody>

                <!-- SAMPLE DATA (REMOVE LATER) -->
                <tr>
                    <td>Sakshi Mahale</td>
                    <td>9876543210</td>
                    <td>08 Apr 2026</td>
                </tr>

                <tr>
                    <td>Vithika Surve</td>
                    <td>9123456780</td>
                    <td>07 Apr 2026</td>
                </tr>

                <tr>
                    <td>Bhakti Baraf</td>
                    <td>9988776655</td>
                    <td>06 Apr 2026</td>
                </tr>

            </tbody>

        </table>

    </section>

    <script src="../js/script.js"></script>
    <!-- 🌿 FOOTER -->
    <footer>
        <p>Admin Control Panel • आranyak Safari System</p>
    </footer>

</body>

</html>
